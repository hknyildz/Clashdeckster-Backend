spring.application.name=ClashProxy

# Clash Royale API
clash.api.token=${CLASH_API_KEY:}

# OpenRouter API
openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.url=https://openrouter.ai/api/v1/chat/completions
openrouter.model=meta-llama/llama-3.3-70b-instruct

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/clashproxy}
spring.datasource.username=${DATABASE_USER:clashproxy}
spring.datasource.password=${DATABASE_PASS:clashproxy_secret}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Scheduling
spring.task.scheduling.pool.size=2

# Meta Deck Job Config
meta.job.player-limit=1000
meta.job.request-delay-ms=100
meta.job.top-deck-limit=100

# Import secrets if available (for local development)
spring.config.import=optional:classpath:application-secrets.properties

# Logging Configuration (Rolling File, Max 7 Days)
logging.file.name=logs/clashproxy.log
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.file-name-pattern=logs/clashproxy-%d{yyyy-MM-dd}.log
